name: Deploy DMS Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker build -t ${{ secrets.REGISTRY_LOGIN_SERVER }}/dms-backend:${{ github.sha }} .
          docker push ${{ secrets.REGISTRY_LOGIN_SERVER }}/dms-backend:${{ github.sha }}

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Log in to Azure
        run: |
          az login --service-principal \
            --username ${{ secrets.REGISTRY_USERNAME }} \
            --password ${{ secrets.REGISTRY_PASSWORD }} \
            --tenant ${{ secrets.AZURE_TENANT_ID }}

      - name: Deploy to Azure Container App
        run: |
          az containerapp update \
            --name dms-backend-container \
            --resource-group DMS-RG \
            --image ${{ secrets.REGISTRY_LOGIN_SERVER }}/dms-backend:${{ github.sha }} \
            --set-env-vars \
              PORT="${{ secrets.PORT }}" \
              NODE_ENV="${{ secrets.NODE_ENV }}" \
              MONGODB_URI="${{ secrets.MONGODB_URI }}" \
              JWT_SECRET="${{ secrets.JWT_SECRET }}" \
              JWT_ALGO="${{ secrets.JWT_ALGO }}" \
              JWT_EXPIRATION="${{ secrets.JWT_EXPIRATION }}" \
              JWT_REFRESH_EXPIRES_IN="${{ secrets.JWT_REFRESH_EXPIRES_IN }}" \
              MAIL_HOST="${{ secrets.MAIL_HOST }}" \
              MAIL_PORT="${{ secrets.MAIL_PORT }}" \
              MAIL_USER="${{ secrets.MAIL_USER }}" \
              MAIL_PASS="${{ secrets.MAIL_PASS }}" \
              MAIL_FROM="${{ secrets.MAIL_FROM }}" \
              AWS_REGION="${{ secrets.AWS_REGION }}" \
              AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              AWS_S3_BUCKET_NAME="${{ secrets.AWS_S3_BUCKET_NAME }}"
