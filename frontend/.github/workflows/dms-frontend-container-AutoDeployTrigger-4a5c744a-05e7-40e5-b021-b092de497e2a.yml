name: Trigger auto deployment for dms-frontend-container

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/dms-frontend-container-AutoDeployTrigger-4a5c744a-05e7-40e5-b021-b092de497e2a.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DMSFRONTENDCONTAINER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DMSFRONTENDCONTAINER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DMSFRONTENDCONTAINER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: dmsregistryy.azurecr.io
          registryUsername: ${{ secrets.DMSFRONTENDCONTAINER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DMSFRONTENDCONTAINER_REGISTRY_PASSWORD }}
          containerAppName: dms-frontend-container
          resourceGroup: DMS-RG
          imageToBuild: dmsregistryy.azurecr.io/dms-frontend-container:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


